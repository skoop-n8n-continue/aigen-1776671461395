<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Look Counter</title>
    <!-- Cache-Control Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles.css?v=a1b2c3">
</head>
<body>
    <div class="app-container">
        <header>
            <h3>3D Counter</h3>
        </header>

        <main>
            <div class="counter-display" id="counterDisplay">
                <!-- Digits will be injected here by JS -->
            </div>

            <div class="controls">
                <input type="number" id="targetInput" placeholder="Enter number..." min="0">
                <button id="startBtn">Start Counting</button>
            </div>
        </main>
    </div>

    <script src="script.js?v=a1b2c3"></script>
</body>
</html>
